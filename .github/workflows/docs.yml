name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'tool/emit_api_rst.dart'
      - 'lib/**'
      - '.github/workflows/docs.yml'
      - 'pubspec.yaml'

# A single in-flight deploy job per branch keeps the gh-pages history
# linear if two pushes land back-to-back.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Engine submodule is not needed to build the docs (the API
          # generator is lexical and the patcher_objects.json snapshot
          # is committed), so skip the submodule init to keep the job
          # quick.
          submodules: false

      - name: Set up Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Sphinx + theme
        run: python -m pip install -r docs/requirements.txt

      - name: dart pub get
        run: dart pub get

      - name: Generate API RST
        run: dart run tool/emit_api_rst.dart --out docs/source/api/_generated

      - name: Build Sphinx site
        run: sphinx-build -W --keep-going -b html docs/source docs/build/html

      - name: Upload artefact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-html
          path: docs/build/html
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to gh-pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download artefact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: docs-html
          path: site

      - name: Deploy
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: 'docs: deploy ${{ github.sha }}'
