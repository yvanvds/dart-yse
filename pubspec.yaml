name: yse
description: Dart bindings for the YSE sound engine — 3D audio playback, mixing, DSP, MIDI, and generative music.
version: 0.1.0
repository: https://github.com/yvanvds/dart-yse
issue_tracker: https://github.com/yvanvds/dart-yse/issues

environment:
  sdk: ^3.8.0

dependencies:
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^20.1.1
  test: ^1.25.0
  lints: ^5.0.0
  # tool/emit_api_rst.dart walks the public API surface to emit RST
  # pages for the Sphinx docs site (docs/). Lexical analysis only —
  # no type resolution — so we keep the dependency loose.
  analyzer: ^7.0.0
